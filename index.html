<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Glowzie - Know Your Skin</title>

<link rel="stylesheet" href="stylesk.css">

</head>


<body style="background-image:url('backgroundimage.avif'); background-size:cover;">


<div class="container">


<h1>Glowzie - Know Your Skin</h1>



<form id="skinForm">


<label>Your Age:</label>

<input type="number" id="age" required>




<label>Your Skin Type:</label>


<select id="skinType" required>


<option value="">Select</option>

<option value="oily">Oily</option>

<option value="dry">Dry</option>

<option value="combination">Combination</option>

<option value="sensitive">Sensitive</option>


</select>





<label>Main Skin Concern:</label>


<select id="concern" required>


<option value="">Select</option>

<option value="acne">Acne</option>

<option value="aging">Aging</option>

<option value="dullness">Dullness</option>

<option value="redness">Redness</option>


</select>




<button type="submit">

Get Solution

</button>



</form>





<div id="result" class="result-box">


<img id="skinImage" class="skin-image">


<div id="tips"></div>


</div>




</div>




<script src="scriptsk.js"></script>


</body>

</html>
